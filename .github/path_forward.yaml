# ─────────────────────────────────────────────────────────────────────────────
# path_forward.yaml — Asset Forward Mapping Rules
#
# Use {REPO_ROOT} as a portable placeholder for the root of this repo.
# The sync script resolves it automatically — no hardcoded paths needed.
#
# Format:
#   from    : Source path (in upstream repo)
#   to      : Destination path (file path = rename, dir path = keep name)
#   enabled : Set to false to temporarily pause this forwarding rule
#
# Notes:
#   - Destination will be OVERWRITTEN on every sync (clean copy)
#   - Source must exist in the upstream repo
#   - You can add as many rules as needed below
# ─────────────────────────────────────────────────────────────────────────────

forwards:

  - from: "{REPO_ROOT}/.tools/README.md"
    to:   "{REPO_ROOT}/.github/tools.md"
    enabled: true
