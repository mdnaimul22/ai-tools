<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Tools Directory — Curated AI-Powered Tools</title>
  <meta name="description" content="A curated directory of top AI-powered tools organized by category.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://mdnaimul22.github.io/ai-tools/">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mdnaimul22.github.io/ai-tools/">
  <meta property="og:title" content="AI Tools Directory — Curated AI-Powered Tools">
  <meta property="og:description" content="A curated directory of top AI-powered tools organized by category.">
  <meta property="og:image" content="https://mdnaimul22.github.io/ai-tools/assets/dashboard_preview.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://mdnaimul22.github.io/ai-tools/">
  <meta property="twitter:title" content="AI Tools Directory — Curated AI-Powered Tools">
  <meta property="twitter:description" content="A curated directory of top AI-powered tools organized by category.">
  <meta property="twitter:image" content="https://mdnaimul22.github.io/ai-tools/assets/dashboard_preview.png">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "AI Tools Directory",
    "operatingSystem": "Web",
    "applicationCategory": "UtilitiesApplication",
    "description": "A curated directory of top AI-powered tools organized by category with instant search and dynamic themes.",
    "url": "https://mdnaimul22.github.io/ai-tools/",
    "author": {
      "@type": "Person",
      "name": "Naimul"
    }
  }
  </script>

  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --radius: 0px;
      --sidebar-w: 280px;
      --transition: .25s ease;
    }

    html {
      font-size: 15px;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: var(--bg-root);
      color: var(--text-1);
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Layout ─────────────────────────── */
    .app {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform var(--transition);
      z-index: 100;
    }

    .sidebar-brand {
      padding: 1.2rem 1.2rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-close {
      background: none;
      border: none;
      color: var(--text-3);
      cursor: pointer;
      font-size: 1.2rem;
      transition: color var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sidebar-close:hover {
      color: var(--accent);
    }

    .sidebar-brand h1 {
      font-size: 1.25rem;
      font-weight: bold;
      color: var(--accent);
      text-shadow: 0 0 8px var(--accent-glow);
      letter-spacing: 2px;
    }

    .header-search {
      flex: 1;
      max-width: 240px;
      margin-left: auto;
    }

    .header-search input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .55rem .85rem;
      color: var(--text-1);
      font-size: .82rem;
      font-family: inherit;
      outline: none;
      transition: border var(--transition);
    }

    .header-search input:focus {
      border-color: var(--accent);
    }

    .header-search input::placeholder {
      color: var(--text-3);
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: .5rem 0;
      scrollbar-width: thin;
      scrollbar-color: var(--bg-hover) transparent;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .6rem 1.1rem;
      cursor: pointer;
      transition: background var(--transition);
      border-left: 3px solid transparent;
      font-size: .82rem;
      color: var(--text-2);
      user-select: none;
    }

    .nav-item:hover {
      background: var(--bg-hover);
      color: var(--text-1);
    }

    .nav-item.active {
      background: var(--accent-glow);
      border-left-color: var(--accent);
      color: var(--text-1);
      font-weight: 500;
    }

    .nav-icon {
      font-size: 1rem;
      flex-shrink: 0;
      width: 1.4rem;
      text-align: center;
    }

    .nav-label {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-count {
      font-size: .75rem;
      background: var(--bg-hover);
      color: var(--accent);
      border: 1px solid var(--border);
      padding: .15rem .45rem;
      border-radius: var(--radius);
      font-weight: bold;
      min-width: 1.6rem;
      text-align: center;
    }

    .nav-item.active .nav-count {
      background: var(--accent);
      color: #fff;
    }

    .theme-btn, .expand-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-2);
      cursor: pointer;
      padding: .45rem .65rem;
      font-size: .88rem;
      line-height: 1;
      transition: background var(--transition), border var(--transition);
      flex-shrink: 0;
      font-family: inherit;
    }
    .theme-btn:hover, .expand-btn:hover {
      background: var(--bg-hover);
      border-color: var(--border-h);
    }

    /* ── Main Content ───────────────────── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .content-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .8rem;
      flex-shrink: 0;
    }

    .content-header h2 {
      flex: 1;
      font-size: 1.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .content-footer {
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: .85rem;
      color: var(--text-3);
      background: var(--bg-sidebar);
      flex-shrink: 0;
    }
      font-size: 1.2rem;
      font-weight: bold;
      white-space: nowrap;
      letter-spacing: 1px;
    }

    .content-header .badge {
      font-size: .75rem;
      background: var(--bg-hover);
      color: var(--accent);
      border: 1px solid var(--border);
      padding: .2rem .55rem;
      border-radius: var(--radius);
      font-weight: bold;
      white-space: nowrap;
    }

    .menu-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--text-1);
      font-size: 1.3rem;
      cursor: pointer;
      padding: .3rem;
    }

    @media (min-width: 769px) {
      .app.sidebar-closed .sidebar {
        margin-left: calc(-1 * var(--sidebar-w));
      }
      .app.sidebar-closed .menu-toggle {
        display: block;
      }
    }

    .tools-container {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 2rem 2rem;
      scrollbar-width: thin;
      scrollbar-color: var(--bg-hover) transparent;
    }

    /* ── Tool Item ───────────────────────── */
    .tool-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: .5rem;
      transition: border var(--transition), background var(--transition);
      overflow: hidden;
    }

    .tool-item:hover {
      border-color: var(--border-h);
      background: var(--bg-hover);
    }

    .tool-row {
      display: flex;
      align-items: center;
      padding: .4rem 0.8rem;
      cursor: pointer;
      gap: 1rem;
    }

    .tool-name {
      flex: 1;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.01em;
    }

    .tool-chevron {
      color: var(--text-3);
      font-size: .85rem;
      transition: transform var(--transition);
      flex-shrink: 0;
    }

    .tool-item.open .tool-chevron {
      transform: rotate(90deg);
    }

    .tool-goto {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: var(--radius);
      background: var(--accent-glow);
      color: var(--accent-light);
      text-decoration: none;
      flex-shrink: 0;
      transition: background var(--transition);
    }

    .tool-goto:hover {
      background: var(--accent);
      color: #fff;
    }

    .tool-goto svg {
      width: 16px;
      height: 16px;
    }

    .tool-desc {
      max-height: 0;
      overflow: hidden;
      transition: max-height .3s ease, padding .3s ease;
      padding: 0 1.2rem;
    }

    .tool-item.open .tool-desc {
      max-height: 120px;
      padding: 0 1.2rem 1rem;
    }

    .tool-desc p {
      font-size: .9rem;
      color: var(--text-2);
      line-height: 1.5;
      margin-top: -0.2rem;
    }

    /* ── Loading / Empty ─────────────────── */
    .state-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: .75rem;
      color: var(--text-3);
      text-align: center;
    }

    .state-msg .icon {
      font-size: 2.5rem;
    }

    .state-msg p {
      font-size: .85rem;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px dashed var(--accent);
      border-radius: 0;
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Mobile ──────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      z-index: 90;
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .overlay.show {
        display: block;
      }

      .menu-toggle {
        display: block;
      }

      .content-header {
        padding: 1rem 1.2rem .8rem;
      }

      .tools-container {
        padding: .75rem 1rem 1.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <h1>⚡ AI Tools</h1>
        <button class="sidebar-close" id="sidebarCloseBtn" title="Close Sidebar">✕</button>
      </div>
      <nav class="sidebar-nav" id="navList"></nav>
    </aside>
    <div class="overlay" id="overlay"></div>
    <main class="content">
      <header class="content-header">
        <button class="menu-toggle" id="menuBtn" title="Open Sidebar">☰</button>
        <h2 id="headerTitle">All Tools</h2>
        <span class="badge" id="headerBadge">0 tools</span>
        <div class="header-search">
          <input type="text" id="searchInput" placeholder="Search tools…">
        </div>
        <button class="expand-btn" id="expandBtn" title="Toggle all descriptions">▼</button>
        <button class="theme-btn" id="themeBtn" title="Switch theme">🎨</button>
      </header>
      <div class="tools-container" id="toolsList">
        <div class="state-msg" id="loadingState">
          <div class="spinner"></div>
          <p>Loading tools directory…</p>
        </div>
      </div>
      <footer class="content-footer">
        <p>&copy; 2024 AI Tools Directory. Curated with ⚡ for the AI community.</p>
      </footer>
    </main>
  </div>

  <script>
    // ── Themes ──────────────────────────────────────────────
    const THEMES = [
      {
        name: 'Matrix',
        icon: '💻',
        vars: {
          '--bg-root': '#050d0a', '--bg-sidebar': '#071510', '--bg-card': '#050d0a',
          '--bg-hover': '#0a1c15', '--bg-active': 'rgba(0,255,136,.1)',
          '--accent': '#00ff88', '--accent-light': '#4ecdc4',
          '--accent-glow': 'rgba(0,255,136,.15)',
          '--text-1': '#00ff88', '--text-2': '#7fffd4', '--text-3': '#4ecdc4',
          '--border': 'rgba(0,255,136,.25)', '--border-h': '#00ff88'
        }
      },
      {
        name: 'Midnight',
        icon: '🌙',
        vars: {
          '--bg-root': '#0b0b10', '--bg-sidebar': '#111118', '--bg-card': '#16161f',
          '--bg-hover': '#1e1e2d', '--bg-active': '#252540',
          '--accent': '#7c3aed', '--accent-light': '#a78bfa',
          '--accent-glow': 'rgba(124,58,237,.12)',
          '--text-1': '#f1f5f9', '--text-2': '#94a3b8', '--text-3': '#64748b',
          '--border': 'rgba(255,255,255,.06)', '--border-h': 'rgba(255,255,255,.1)'
        }
      },
      {
        name: 'Ocean',
        icon: '🌊',
        vars: {
          '--bg-root': '#0a1628', '--bg-sidebar': '#0f1d32', '--bg-card': '#142640',
          '--bg-hover': '#1a3050', '--bg-active': '#203a5c',
          '--accent': '#0ea5e9', '--accent-light': '#38bdf8',
          '--accent-glow': 'rgba(14,165,233,.12)',
          '--text-1': '#e0f2fe', '--text-2': '#7dd3fc', '--text-3': '#0c4a6e',
          '--border': 'rgba(56,189,248,.08)', '--border-h': 'rgba(56,189,248,.15)'
        }
      }
    ];
    let currentTheme = 0;

    function applyTheme(index) {
      const theme = THEMES[index];
      const root = document.documentElement;
      for (const [k, v] of Object.entries(theme.vars)) root.style.setProperty(k, v);
      $('themeBtn').textContent = theme.icon;
      $('themeBtn').title = `Theme: ${theme.name}`;
      localStorage.setItem('ai-tools-theme', index);
    }

    // ── Config ──────────────────────────────────────────────
    const DATA_URLS = [
      './.github/tools.md',
      'https://raw.githubusercontent.com/mdnaimul22/ai-tools/main/.github/tools.md'
    ];

    const BLACKLIST = ['Contributing', 'Format', 'Contributors 😍', 'Contributors'];

    const ICONS = {
      'Art & Creativity': '🎨', 'Conversational AI': '💬', 'Design': '📐',
      'E-commerce': '🛒', 'Finance': '💰', 'Education': '📚',
      'Developer': '💻', 'Gaming, 3D, Motion': '🎮', 'Sales/Marketing': '📈',
      'Productivity': '⚡', 'Search Engines & Tools': '🔍',
      'Research Tools': '🔬', 'Geospatial': '🌍', 'Customer Support': '🎧',
      'Phone Calls': '📞', 'HR': '👥', 'Others': '📦'
    };

    const LINK_SVG = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 13L13 7M13 7H8M13 7V12"/><rect x="3" y="3" width="14" height="14" rx="2"/></svg>`;

    // ── State ───────────────────────────────────────────────
    let categories = [];
    let activeCategory = null;

    // ── DOM ──────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const navList = $('navList');
    const toolsList = $('toolsList');
    const headerTitle = $('headerTitle');
    const headerBadge = $('headerBadge');
    const searchInput = $('searchInput');
    const sidebar = $('sidebar');
    const themeBtn = $('themeBtn');
    const expandBtn = $('expandBtn');
    const overlay = $('overlay');
    const menuBtn = $('menuBtn');
    const sidebarCloseBtn = $('sidebarCloseBtn');

    // ── Parser ──────────────────────────────────────────────
    function extractLink(text) {
      const m = text.match(/\[([^\]]*)\]\(([^)]+)\)/);
      return m ? { text: m[1], url: m[2] } : null;
    }

    function parseRow(line) {
      const cells = line.split('|').map(c => c.trim()).filter(Boolean);
      if (cells.length < 2) return null;

      // Extract link from third column (the 🔗 link)
      let linkUrl = '';
      if (cells[2]) {
        const lk = extractLink(cells[2]);
        if (lk) linkUrl = lk.url;
      }

      // First cell: could be [Name](url) or just plain "Name"
      const first = extractLink(cells[0]);
      let name, url;
      if (first) {
        name = first.text;
        url = linkUrl || first.url;
      } else {
        name = cells[0];
        url = linkUrl;
      }

      if (!name || !url) return null;
      const desc = cells[1] || '';
      return { name, description: desc, url };
    }

    function parseListItem(line) {
      const m = line.match(/^-\s*\[([^\]]+)\]\(([^)]+)\)\s*[-–—]?\s*(.*)/);
      return m ? { name: m[1], description: m[3].trim(), url: m[2] } : null;
    }

    function isSkipRow(t) {
      // Separator rows: |------|------|------|
      if (/^\|[\s\-:|]+\|$/.test(t) || /^\|[\s\-:|]+$/.test(t)) return true;
      // Header rows: | Tools | Used for | Link |
      const lower = t.toLowerCase();
      if (lower.includes('| tools') && (lower.includes('used for') || lower.includes('link'))) return true;
      return false;
    }

    function parseMD(md) {
      const lines = md.split('\n');
      const cats = [];
      let cur = null;

      for (const line of lines) {
        const t = line.trim();

        if (t.startsWith('## ')) {
          const name = t.slice(3).trim();
          if (BLACKLIST.includes(name)) { cur = null; continue; }
          cur = { name, icon: ICONS[name] || '📌', tools: [] };
          cats.push(cur);
          continue;
        }
        if (!cur) continue;
        if (!t || isSkipRow(t)) continue;

        if (t.startsWith('|')) {
          const tool = parseRow(t);
          if (tool) cur.tools.push(tool);
        } else if (t.startsWith('- [')) {
          const tool = parseListItem(t);
          if (tool) cur.tools.push(tool);
        }
      }
      return cats;
    }

    // ── Render ───────────────────────────────────────────────
    function renderNav() {
      const total = categories.reduce((s, c) => s + c.tools.length, 0);
      let html = '';

      for (const cat of categories) {
        const isActive = activeCategory === cat.name;
        html += `<div class="nav-item${isActive ? ' active' : ''}" data-cat="${cat.name}">
          <span class="nav-icon">${cat.icon}</span>
          <span class="nav-label">${cat.name}</span>
          <span class="nav-count">${cat.tools.length}</span></div>`;
      }

      html += `<div class="nav-item${activeCategory === null ? ' active' : ''}" data-cat="__all__">
        <span class="nav-icon">🏠</span><span class="nav-label">All Tools</span>
        <span class="nav-count">${total}</span></div>`;

      navList.innerHTML = html;

      navList.querySelectorAll('.nav-item').forEach(el => {
        el.addEventListener('click', () => {
          const cat = el.dataset.cat;
          const target = cat === '__all__' ? '' : cat;
          window.location.hash = target;
          // Hash change listener will handle the rest
        });
      });
    }

    // Listen for hash changes to support deep-linking and browser back/forward
    window.addEventListener('hashchange', () => {
      const hash = decodeURIComponent(window.location.hash.substring(1));
      activeCategory = hash || null;
      renderNav();
      renderTools();
    });

    function getVisibleTools() {
      const query = searchInput.value.toLowerCase().trim();
      let tools = [];
      const src = activeCategory
        ? categories.filter(c => c.name === activeCategory)
        : categories;

      for (const cat of src) {
        for (const tool of cat.tools) {
          if (!query || tool.name.toLowerCase().includes(query) || tool.description.toLowerCase().includes(query)) {
            tools.push({ ...tool, category: cat.name, icon: cat.icon });
          }
        }
      }
      return tools;
    }

    function renderTools() {
      const tools = getVisibleTools();
      headerTitle.textContent = activeCategory || 'All Tools';
      headerBadge.textContent = `${tools.length} tool${tools.length !== 1 ? 's' : ''}`;

      isExpanded = false;
      if (expandBtn) expandBtn.innerHTML = '▼';

      if (!tools.length) {
        toolsList.innerHTML = `<div class="state-msg"><span class="icon">🔎</span><p>No tools found</p></div>`;
        return;
      }

      toolsList.innerHTML = tools.map(t => `
        <div class="tool-item">
          <div class="tool-row" onclick="this.parentElement.classList.toggle('open')">
            <span class="tool-chevron">▶</span>
            <span class="tool-name">${esc(t.name)}</span>
            <a class="tool-goto" href="${esc(t.url)}" target="_blank" rel="noopener" title="Visit ${esc(t.name)}" onclick="event.stopPropagation()">${LINK_SVG}</a>
          </div>
          <div class="tool-desc"><p>${esc(t.description)}</p></div>
        </div>`).join('');
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ── Sidebar Toggle ──────────────────────────────────────────────
    function closeSidebar() {
      if (window.innerWidth <= 768) {
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
      } else {
        document.querySelector('.app').classList.add('sidebar-closed');
      }
    }

    function openSidebar() {
      if (window.innerWidth <= 768) {
        sidebar.classList.add('open');
        overlay.classList.add('show');
      } else {
        document.querySelector('.app').classList.remove('sidebar-closed');
      }
    }

    menuBtn.addEventListener('click', openSidebar);
    sidebarCloseBtn.addEventListener('click', closeSidebar);
    overlay.addEventListener('click', closeSidebar);

    // ── Search ──────────────────────────────────────────────
    let debounce;
    searchInput.addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(renderTools, 200);
    });

    // ── Expand Toggle ───────────────────────────────────────
    let isExpanded = false;
    expandBtn.addEventListener('click', () => {
      isExpanded = !isExpanded;
      expandBtn.innerHTML = isExpanded ? '▲' : '▼';
      document.querySelectorAll('.tool-item').forEach(el => {
        if (isExpanded) el.classList.add('open');
        else el.classList.remove('open');
      });
    });

    // ── Theme Switcher ──────────────────────────────────────
    themeBtn.addEventListener('click', () => {
      currentTheme = (currentTheme + 1) % THEMES.length;
      applyTheme(currentTheme);
    });

    // ── Init ────────────────────────────────────────────────
    async function fetchMD() {
      for (const url of DATA_URLS) {
        try {
          const res = await fetch(url);
          if (res.ok) return await res.text();
        } catch (_) { }
      }
      return null;
    }

    (async () => {
      // Apply saved or default theme
      const saved = parseInt(localStorage.getItem('ai-tools-theme') || '0', 10);
      currentTheme = saved < THEMES.length ? saved : 0;
      applyTheme(currentTheme);

      // Handle initial deep-link from hash
      const hash = decodeURIComponent(window.location.hash.substring(1));
      activeCategory = hash || null;

      const md = await fetchMD();
      if (!md) {
        toolsList.innerHTML = `<div class="state-msg"><span class="icon">⚠️</span><p>Failed to load tools data.</p></div>`;
        return;
      }
      categories = parseMD(md);
      renderNav();
      renderTools();
    })();
  </script>
</body>

</html>
